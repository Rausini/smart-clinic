version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: smart-clinic-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: smartclinic123
      MYSQL_DATABASE: smart_clinic
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psmartclinic123"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart-clinic-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smart_clinic?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: smartclinic123
      APP_JWT_SECRET: SmartClinicSecretKey2026XYZ123456789AbcDef
      APP_JWT_EXPIRATION: 86400000
      APP_CORS_ALLOWED_ORIGINS: "http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
