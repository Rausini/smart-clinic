<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Clinic — Patient Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f0fff4; }
    #loginCard { max-width: 420px; margin: 80px auto; }
    #dashboard { display: none; }
    .card { border: none; box-shadow: 0 2px 12px rgba(0,0,0,.08); border-radius: 12px; }
    table th { background: #198754; color: #fff; }
    .doctor-card { cursor: pointer; transition: box-shadow .2s; }
    .doctor-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.15); }
    .nav-tabs .nav-link.active { font-weight: 600; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-success px-4">
  <span class="navbar-brand">🏥 Smart Clinic — Patient Portal</span>
  <span id="patientName" class="text-white me-3"></span>
  <button id="logoutBtn" class="btn btn-outline-light btn-sm d-none" onclick="logout()">Logout</button>
</nav>

<!-- LOGIN -->
<div id="loginCard" class="card p-4">
  <h4 class="mb-3 text-center">Patient Login</h4>
  <div id="loginError" class="alert alert-danger d-none"></div>
  <div class="mb-3">
    <label class="form-label">Email</label>
    <input type="email" id="loginEmail" class="form-control" placeholder="patient@email.com"/>
  </div>
  <div class="mb-3">
    <label class="form-label">Password</label>
    <input type="password" id="loginPassword" class="form-control"/>
  </div>
  <button class="btn btn-success w-100 mb-3" onclick="login()">Sign In as Patient</button>
  <hr/>
  <p class="text-center text-muted small mb-2">Don't have an account?</p>
  <button class="btn btn-outline-success w-100" data-bs-toggle="modal" data-bs-target="#registerModal">Register</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container py-4">
  <ul class="nav nav-tabs mb-4" id="portalTabs">
    <li class="nav-item">
      <button class="nav-link active" onclick="showTab('searchTab', this)">🔍 Find a Doctor</button>
    </li>
    <li class="nav-item">
      <button class="nav-link" onclick="showTab('appointmentsTab', this)">📅 My Appointments</button>
    </li>
  </ul>

  <!-- Search Tab -->
  <div id="searchTab">
    <div class="card p-4 mb-4">
      <div class="row g-2 align-items-end">
        <div class="col-md-5">
          <label class="form-label">Search by Name</label>
          <input type="text" id="searchName" class="form-control" placeholder="e.g. Dr. Ana"/>
        </div>
        <div class="col-md-4">
          <label class="form-label">Filter by Speciality</label>
          <input type="text" id="searchSpeciality" class="form-control" placeholder="e.g. Cardiology"/>
        </div>
        <div class="col-md-3">
          <button class="btn btn-success w-100" onclick="searchDoctors()">Search</button>
        </div>
      </div>
    </div>

    <div id="doctorResults" class="row g-3"></div>
  </div>

  <!-- Appointments Tab -->
  <div id="appointmentsTab" style="display:none">
    <div class="card p-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">My Appointments</h5>
        <button class="btn btn-outline-success btn-sm" onclick="loadMyAppointments()">Refresh</button>
      </div>
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead>
            <tr><th>ID</th><th>Doctor</th><th>Speciality</th><th>Date</th><th>Time</th><th>Status</th><th>Notes</th></tr>
          </thead>
          <tbody id="myAppointmentsTable"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Book Appointment Modal -->
<div class="modal fade" id="bookModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title">Book Appointment</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="bookMsg" class="alert d-none"></div>
        <p>Doctor: <strong id="bookDoctorName"></strong></p>
        <input type="hidden" id="bookDoctorId"/>
        <div class="mb-3">
          <label class="form-label">Date</label>
          <input type="date" id="bookDate" class="form-control"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Time</label>
          <input type="time" id="bookTime" class="form-control"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Notes (optional)</label>
          <textarea id="bookNotes" class="form-control" rows="2"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success" onclick="bookAppointment()">Confirm Booking</button>
      </div>
    </div>
  </div>
</div>

<!-- Register Modal -->
<div class="modal fade" id="registerModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title">Patient Registration</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="regMsg" class="alert d-none"></div>
        <div class="mb-2"><input type="text" id="regName" class="form-control" placeholder="Full Name"/></div>
        <div class="mb-2"><input type="email" id="regEmail" class="form-control" placeholder="Email"/></div>
        <div class="mb-2"><input type="password" id="regPassword" class="form-control" placeholder="Password"/></div>
        <div class="mb-2"><input type="text" id="regPhone" class="form-control" placeholder="Phone (optional)"/></div>
        <div class="mb-2">
          <label class="form-label small text-muted">Date of Birth</label>
          <input type="date" id="regDob" class="form-control"/>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success" onclick="register()">Register</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API = 'http://localhost:8080/api';
  let token = null;
  let patientId = null;

  async function login() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errEl    = document.getElementById('loginError');
    errEl.classList.add('d-none');

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, role: 'PATIENT' })
      });
      if (!res.ok) throw new Error('Invalid credentials');
      const data = await res.json();
      token     = data.token;
      patientId = data.userId;
      document.getElementById('patientName').textContent = `Welcome, ${data.name}`;
      document.getElementById('loginCard').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('logoutBtn').classList.remove('d-none');
      searchDoctors();
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.remove('d-none');
    }
  }

  async function register() {
    const msgEl = document.getElementById('regMsg');
    msgEl.classList.add('d-none');
    const body = {
      name:        document.getElementById('regName').value.trim(),
      email:       document.getElementById('regEmail').value.trim(),
      password:    document.getElementById('regPassword').value,
      phone:       document.getElementById('regPhone').value.trim(),
      dateOfBirth: document.getElementById('regDob').value || null
    };
    try {
      const res = await fetch(`${API}/patients/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error(await res.text());
      msgEl.className = 'alert alert-success';
      msgEl.textContent = 'Registration successful! You can now log in.';
      msgEl.classList.remove('d-none');
    } catch (e) {
      msgEl.className = 'alert alert-danger';
      msgEl.textContent = 'Error: ' + e.message;
      msgEl.classList.remove('d-none');
    }
  }

  async function searchDoctors() {
    const name       = document.getElementById('searchName').value.trim();
    const speciality = document.getElementById('searchSpeciality').value.trim();

    let url = `${API}/doctors`;
    if (name)       url += `/search?name=${encodeURIComponent(name)}`;
    else if (speciality) url += `/search?speciality=${encodeURIComponent(speciality)}`;

    const res     = await fetch(url);
    const doctors = await res.json();
    const results = document.getElementById('doctorResults');

    if (doctors.length === 0) {
      results.innerHTML = '<p class="text-muted">No doctors found.</p>';
      return;
    }
    results.innerHTML = doctors.map(d => `
      <div class="col-md-4">
        <div class="card p-3 doctor-card" onclick="openBooking(${d.id}, '${d.name}')">
          <h6 class="mb-1">👨‍⚕️ ${d.name}</h6>
          <span class="badge bg-success mb-2">${d.speciality}</span>
          <p class="text-muted small mb-1">📧 ${d.email}</p>
          <p class="text-muted small mb-2">📞 ${d.phone || 'N/A'}</p>
          <button class="btn btn-success btn-sm w-100">Book Appointment</button>
        </div>
      </div>
    `).join('');
  }

  function openBooking(dId, dName) {
    document.getElementById('bookDoctorId').value = dId;
    document.getElementById('bookDoctorName').textContent = dName;
    document.getElementById('bookMsg').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('bookModal')).show();
  }

  async function bookAppointment() {
    const msgEl = document.getElementById('bookMsg');
    msgEl.classList.add('d-none');
    const body = {
      doctorId:        parseInt(document.getElementById('bookDoctorId').value),
      patientId:       patientId,
      appointmentDate: document.getElementById('bookDate').value,
      appointmentTime: document.getElementById('bookTime').value + ':00',
      notes:           document.getElementById('bookNotes').value
    };
    try {
      const res = await fetch(`${API}/appointments`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error(await res.text());
      msgEl.className = 'alert alert-success';
      msgEl.textContent = 'Appointment booked successfully!';
      msgEl.classList.remove('d-none');
    } catch (e) {
      msgEl.className = 'alert alert-danger';
      msgEl.textContent = 'Error: ' + e.message;
      msgEl.classList.remove('d-none');
    }
  }

  async function loadMyAppointments() {
    const res  = await fetch(`${API}/appointments/patient/${patientId}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    const tbody = document.getElementById('myAppointmentsTable');
    tbody.innerHTML = data.map(a => `
      <tr>
        <td>${a.id}</td>
        <td><strong>${a.doctor.name}</strong></td>
        <td>${a.doctor.speciality}</td>
        <td>${a.appointmentDate}</td>
        <td>${a.appointmentTime}</td>
        <td><span class="badge bg-${a.status === 'SCHEDULED' ? 'primary' : a.status === 'COMPLETED' ? 'success' : 'danger'}">${a.status}</span></td>
        <td>${a.notes || '—'}</td>
      </tr>
    `).join('');
  }

  function showTab(tabId, btn) {
    ['searchTab','appointmentsTab'].forEach(id => {
      document.getElementById(id).style.display = id === tabId ? 'block' : 'none';
    });
    document.querySelectorAll('#portalTabs .nav-link').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (tabId === 'appointmentsTab') loadMyAppointments();
  }

  function logout() {
    token = null; patientId = null;
    document.getElementById('loginCard').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('logoutBtn').classList.add('d-none');
    document.getElementById('patientName').textContent = '';
  }
</script>
</body>
</html>
