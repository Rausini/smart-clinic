<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Clinic — Admin Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background: #f0f4f8; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    #loginCard { max-width: 420px; margin: 80px auto; }
    #dashboard { display: none; }
    .card { border: none; box-shadow: 0 2px 12px rgba(0,0,0,.08); border-radius: 12px; }
    .badge-admin { background: #dc3545; }
    table th { background: #343a40; color: #fff; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand">🏥 Smart Clinic — Admin Portal</span>
  <button id="logoutBtn" class="btn btn-outline-light btn-sm d-none" onclick="logout()">Logout</button>
</nav>

<!-- LOGIN -->
<div id="loginCard" class="card p-4">
  <h4 class="mb-3 text-center">Admin Login</h4>
  <div id="loginError" class="alert alert-danger d-none"></div>
  <div class="mb-3">
    <label class="form-label">Email</label>
    <input type="email" id="loginEmail" class="form-control" placeholder="admin@smartclinic.com"/>
  </div>
  <div class="mb-3">
    <label class="form-label">Password</label>
    <input type="password" id="loginPassword" class="form-control" placeholder="••••••••"/>
  </div>
  <button class="btn btn-danger w-100" onclick="login()">Sign In as Admin</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="container py-4">
  <div class="row g-4">
    <!-- Add Doctor -->
    <div class="col-md-4">
      <div class="card p-4">
        <h5 class="mb-3">➕ Add New Doctor</h5>
        <div id="addDoctorMsg" class="alert d-none"></div>
        <div class="mb-2">
          <input type="text" id="dName" class="form-control" placeholder="Full Name"/>
        </div>
        <div class="mb-2">
          <input type="text" id="dSpeciality" class="form-control" placeholder="Speciality"/>
        </div>
        <div class="mb-2">
          <input type="email" id="dEmail" class="form-control" placeholder="Email"/>
        </div>
        <div class="mb-2">
          <input type="password" id="dPassword" class="form-control" placeholder="Password"/>
        </div>
        <div class="mb-3">
          <input type="text" id="dPhone" class="form-control" placeholder="Phone (optional)"/>
        </div>
        <button class="btn btn-success w-100" onclick="addDoctor()">Add Doctor</button>
      </div>
    </div>

    <!-- Doctor List -->
    <div class="col-md-8">
      <div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5 class="mb-0">👨‍⚕️ Registered Doctors</h5>
          <button class="btn btn-outline-secondary btn-sm" onclick="loadDoctors()">Refresh</button>
        </div>
        <div class="table-responsive">
          <table class="table table-hover align-middle">
            <thead>
              <tr>
                <th>ID</th><th>Name</th><th>Speciality</th><th>Email</th><th>Phone</th><th>Action</th>
              </tr>
            </thead>
            <tbody id="doctorsTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const API = 'http://localhost:8080/api';
  let token = null;

  async function login() {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errEl    = document.getElementById('loginError');
    errEl.classList.add('d-none');

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password, role: 'ADMIN' })
      });
      if (!res.ok) throw new Error('Invalid credentials');
      const data = await res.json();
      token = data.token;
      document.getElementById('loginCard').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('logoutBtn').classList.remove('d-none');
      loadDoctors();
    } catch (e) {
      errEl.textContent = e.message;
      errEl.classList.remove('d-none');
    }
  }

  async function loadDoctors() {
    const res = await fetch(`${API}/doctors`);
    const doctors = await res.json();
    const tbody = document.getElementById('doctorsTable');
    tbody.innerHTML = doctors.map(d => `
      <tr>
        <td>${d.id}</td>
        <td><strong>${d.name}</strong></td>
        <td><span class="badge bg-secondary">${d.speciality}</span></td>
        <td>${d.email}</td>
        <td>${d.phone || '—'}</td>
        <td><button class="btn btn-danger btn-sm" onclick="deleteDoctor(${d.id})">Remove</button></td>
      </tr>
    `).join('');
  }

  async function addDoctor() {
    const msgEl = document.getElementById('addDoctorMsg');
    msgEl.classList.add('d-none');
    const body = {
      name:       document.getElementById('dName').value.trim(),
      speciality: document.getElementById('dSpeciality').value.trim(),
      email:      document.getElementById('dEmail').value.trim(),
      password:   document.getElementById('dPassword').value,
      phone:      document.getElementById('dPhone').value.trim()
    };
    try {
      const res = await fetch(`${API}/doctors`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error(await res.text());
      msgEl.className = 'alert alert-success';
      msgEl.textContent = `Doctor "${body.name}" added successfully!`;
      msgEl.classList.remove('d-none');
      ['dName','dSpeciality','dEmail','dPassword','dPhone'].forEach(id => document.getElementById(id).value = '');
      loadDoctors();
    } catch (e) {
      msgEl.className = 'alert alert-danger';
      msgEl.textContent = 'Error: ' + e.message;
      msgEl.classList.remove('d-none');
    }
  }

  async function deleteDoctor(id) {
    if (!confirm('Remove this doctor?')) return;
    await fetch(`${API}/doctors/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    loadDoctors();
  }

  function logout() {
    token = null;
    document.getElementById('loginCard').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('logoutBtn').classList.add('d-none');
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPassword').value = '';
  }
</script>
</body>
</html>
